<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1e40af">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HaulBook">
<title>HaulBook</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --p:#1e40af;--pd:#1e3a8a;--pl:#dbeafe;--p2:#3b82f6;
  --g:#16a34a;--r:#dc2626;--y:#d97706;--o:#ea580c;
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;
  --text:#1e293b;--muted:#64748b;--light:#f8fafc;
  --nav-h:60px;--safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text)}
input,select,button,textarea{font-family:inherit;font-size:16px}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1e3a8a 0%,#1e40af 50%,#2563eb 100%)}
.auth-box{background:#fff;border-radius:20px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .truck-ico{font-size:48px;display:block;margin-bottom:8px}
.auth-logo h1{font-size:24px;font-weight:800;color:var(--p)}
.auth-logo p{color:var(--muted);font-size:14px;margin-top:4px}
.auth-box h2{font-size:18px;font-weight:700;margin-bottom:6px}
.auth-box .sub{color:var(--muted);font-size:14px;margin-bottom:20px}
.err-msg{background:#fef2f2;color:var(--r);border-radius:8px;padding:10px 14px;font-size:14px;margin-bottom:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px}
.field input,.field select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;outline:none;transition:border .2s;background:#fff}
.field input:focus,.field select:focus{border-color:var(--p)}
.role-pick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.role-btn{border:2px solid var(--border);background:#fff;border-radius:12px;padding:14px;cursor:pointer;text-align:center;transition:all .2s}
.role-btn.active{border-color:var(--p);background:var(--pl)}
.role-btn .ico{font-size:28px;display:block;margin-bottom:4px}
.role-btn .lbl{font-size:13px;font-weight:600;color:var(--text)}
.role-btn .desc{font-size:11px;color:var(--muted);margin-top:2px}
.auth-switch{text-align:center;font-size:14px;color:var(--muted);margin-top:16px}
.auth-switch span{color:var(--p);cursor:pointer;font-weight:600}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:var(--nav-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;padding-top:env(safe-area-inset-top)}
.topbar-title{font-size:18px;font-weight:800;flex:1;color:var(--p)}
.topbar-badge{font-size:11px;font-weight:700;background:var(--pl);color:var(--p);padding:3px 8px;border-radius:20px}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 16px)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-b));background:#fff;border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-b)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--muted);padding:8px 4px;transition:color .2s}
.nav-btn.active{color:var(--p)}
.nav-btn .nav-ico{font-size:22px;line-height:1}
.nav-btn .nav-lbl{font-size:10px;font-weight:600}

/* CARDS */
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
.card-body{padding:16px}
.card-title{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--text)}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi-grid.three{grid-template-columns:1fr 1fr 1fr}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center}
.kpi-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-val{font-size:20px;font-weight:800;color:var(--text)}
.kpi-val.g{color:var(--g)}
.kpi-val.b{color:var(--p)}
.kpi-val.r{color:var(--r)}
.kpi-val.o{color:var(--o)}

/* LIST ITEMS */
.list-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none;padding-bottom:0}
.li-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.li-main{flex:1;min-width:0}
.li-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:12px;color:var(--muted);margin-top:2px}
.li-amount{font-size:15px;font-weight:700;white-space:nowrap}
.li-amount.g{color:var(--g)}
.li-amount.r{color:var(--r)}
.li-amount.b{color:var(--p)}

/* FORMS */
.form-row{display:flex;gap:10px;margin-bottom:12px}
.form-row.full{flex-direction:column}
.fg{flex:1;display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:600;color:var(--muted)}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;outline:none;background:#fff;transition:border .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--p)}
.fg textarea{resize:vertical;min-height:64px;font-size:14px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;width:100%;margin-top:4px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--p);color:#fff}
.btn-primary:hover{background:var(--pd)}
.btn-green{background:var(--g);color:#fff}
.btn-danger{background:#fef2f2;color:var(--r);width:auto;padding:7px 12px;margin:0;font-size:13px}
.btn-sm{padding:6px 10px;font-size:12px;width:auto;margin:0}
.btn-outline{background:#fff;color:var(--p);border:1.5px solid var(--p)}
.btn-scan{background:var(--pl);color:var(--pd);padding:7px 14px;font-size:13px;width:auto;margin:0;border-radius:8px}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:var(--pl);color:var(--p)}
.badge-green{background:#dcfce7;color:var(--g)}
.badge-red{background:#fef2f2;color:var(--r)}
.badge-yellow{background:#fef3c7;color:var(--y)}
.badge-orange{background:#fff7ed;color:var(--o)}

/* SECTION HEADER */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-hdr h3{font-size:15px;font-weight:700}

/* RECEIPT PREVIEW */
.receipt-preview{display:none;margin-bottom:12px;border-radius:10px;overflow:hidden;border:2px solid var(--p);position:relative}
.receipt-preview img{width:100%;max-height:160px;object-fit:cover;display:block}
.receipt-scanning{display:none;position:absolute;inset:0;background:rgba(30,64,175,.85);color:#fff;align-items:center;justify-content:center;font-size:14px;font-weight:600;gap:8px}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-ico{font-size:40px;margin-bottom:10px}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:30px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:800;margin-bottom:18px}

/* CHART */
.chart-wrap{position:relative;height:180px;margin-top:8px}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<input type="file" id="receipt-input" accept="image/*" capture="environment" style="display:none" onchange="onReceiptFile(this)">

<script>
'use strict';
// ─── State ───────────────────────────────────────────
let token = localStorage.getItem('hb_token');
let user  = null;
let tab   = 'dashboard';
let authMode = 'login';
let selectedRole = 'driver';
let pendingToken = null;  // set during MFA step

let summary  = null;
let loads    = [];
let expenses = [];
let fuel     = [];
let trucks   = [];
let drivers  = [];
let settlements = [];
let ifta     = null;

// ─── Helpers ─────────────────────────────────────────
const $ = id => document.getElementById(id);
const v = id => ($( id)?.value || '').trim();
function today() { return new Date().toISOString().slice(0,10); }
function $n(n)   { return '$' + (n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function $mi(n)  { return (n||0).toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1}) + ' mi'; }
function fd(d)   { if(!d) return '—'; try { return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); } catch { return d; } }
function statusBadge(s) {
  const map = { delivered:'badge-green', pending:'badge-yellow', cancelled:'badge-red', draft:'badge-yellow', paid:'badge-green', void:'badge-red' };
  return `<span class="badge ${map[s]||'badge-blue'}">${s}</span>`;
}

let toastTimer;
function toast(msg, ico='ℹ️') {
  const el = $('toast');
  el.textContent = ico + ' ' + msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function setBtnLoading(id, on) {
  const el = $(id); if (!el) return;
  if (on) { el.dataset.label = el.dataset.label||el.textContent; el.textContent = 'Saving…'; el.disabled = true; }
  else { el.textContent = el.dataset.label||el.textContent; el.disabled = false; }
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body)  opts.body = JSON.stringify(body);
  try {
    const r = await fetch('/api' + path, opts);
    return await r.json();
  } catch { return { error: 'Network error' }; }
}

// ─── Auth ─────────────────────────────────────────────
async function reload() {
  [summary, loads, expenses, fuel] = await Promise.all([
    api('GET','/summary'),
    api('GET','/loads'),
    api('GET','/expenses'),
    api('GET','/fuel'),
  ]);
  if (user?.role === 'owner') {
    [trucks, drivers, settlements] = await Promise.all([
      api('GET','/trucks'),
      api('GET','/drivers'),
      api('GET','/settlements'),
    ]);
  }
}

async function doLogin() {
  const email = v('li-email'), pass = v('li-pass');
  if (!email || !pass) return toast('Fill in all fields','⚠️');
  $('auth-err').style.display='none';
  const r = await api('POST','/auth/login',{email,password:pass});
  if (r?.token) {
    token = r.token; user = { name: r.name, role: r.role };
    localStorage.setItem('hb_token', token); await boot();
  } else if (r?.pending_mfa) {
    pendingToken = r.pending_token;
    authMode = 'otp';
    $('root').innerHTML = renderOTP(r.hint || 'Check your email or phone');
  } else {
    $('auth-err').textContent = r?.error||'Login failed';
    $('auth-err').style.display='block';
  }
}

async function doSignup() {
  const name = v('su-name'), email = v('su-email'), pass = v('su-pass');
  if (!name || !email || !pass) return toast('Fill in all fields','⚠️');
  if (pass.length < 8) return toast('Password must be 8+ characters','⚠️');
  $('auth-err').style.display='none';
  const r = await api('POST','/auth/signup',{name,email,password:pass,role:selectedRole});
  if (r?.token) { token = r.token; user = { name: r.name, role: r.role }; localStorage.setItem('hb_token', token); await boot(); }
  else { $('auth-err').textContent = r?.error||'Signup failed'; $('auth-err').style.display='block'; }
}

async function doVerifyOTP() {
  const otp = v('otp-code');
  if (otp.length !== 6) return toast('Enter the 6-digit code','⚠️');
  const errEl = $('otp-err');
  errEl.style.display='none';
  const r = await api('POST','/auth/verify-otp',{pending_token:pendingToken,otp});
  if (r?.token) {
    token = r.token; user = { name: r.name, role: r.role };
    localStorage.setItem('hb_token', token); pendingToken = null; await boot();
  } else {
    errEl.textContent = r?.error || 'Invalid code'; errEl.style.display='block';
  }
}

async function doResendOTP() {
  const r = await api('POST','/auth/resend-otp',{pending_token:pendingToken});
  if (r?.ok) toast('New code sent!','✅');
  else toast(r?.error||'Failed to resend','❌');
}

function renderOTP(hint) {
  return `<div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo"><span class="truck-ico">🔐</span><h1>HaulBook</h1></div>
      <h2>Verify your identity</h2>
      <p class="sub">${hint}</p>
      <div id="otp-err" class="err-msg" style="display:none"></div>
      <div class="field">
        <label>6-digit code</label>
        <input id="otp-code" type="text" inputmode="numeric" maxlength="6" placeholder="000000"
          style="font-size:28px;letter-spacing:8px;text-align:center;font-weight:700"
          onkeydown="if(event.key==='Enter')doVerifyOTP()">
      </div>
      <button class="btn btn-primary" onclick="doVerifyOTP()">Verify</button>
      <div class="auth-switch" style="margin-top:12px">
        <span onclick="doResendOTP()">Resend code</span> &nbsp;·&nbsp;
        <span onclick="authMode='login';pendingToken=null;render()">Back to sign in</span>
      </div>
    </div>
  </div>`;
}

function doLogout() { token = null; user = null; localStorage.removeItem('hb_token'); summary=null; loads=[]; expenses=[]; fuel=[]; pendingToken=null; authMode='login'; render(); }

async function boot() {
  const me = await api('GET','/auth/me');
  if (!me || me.error) { doLogout(); return; }
  user = me;
  await reload();
  tab = 'dashboard';
  render();
}

// ─── Render ───────────────────────────────────────────
function render() {
  const root = $('root');
  if (!token || !user) { root.innerHTML = renderAuth(); return; }
  root.innerHTML = `
    <div class="app">
      <div class="topbar">
        <span class="topbar-title">🚛 HaulBook</span>
        <span class="topbar-badge">${user.role === 'owner' ? '👔 Owner' : '🚚 Driver'}</span>
        <button class="btn btn-danger btn-sm" onclick="doLogout()" style="margin:0;width:auto">Sign out</button>
      </div>
      <div class="content" id="page-content">${renderPage()}</div>
      <nav class="bottom-nav">${renderNav()}</nav>
    </div>`;
}

function renderNav() {
  const isOwner = user?.role === 'owner';
  const tabs = isOwner
    ? [['dashboard','📊','Summary'],['loads','📦','Loads'],['fleet','🚛','Fleet'],['settlements','💵','Pay'],['more','⋯','More']]
    : [['dashboard','📊','Summary'],['loads','📦','Loads'],['expenses','💸','Expenses'],['fuel','⛽','Fuel'],['more','⋯','More']];
  return tabs.map(([id,ico,lbl])=>
    `<button class="nav-btn ${tab===id?'active':''}" onclick="setTab('${id}')">
      <span class="nav-ico">${ico}</span><span class="nav-lbl">${lbl}</span>
    </button>`).join('');
}

function setTab(t) { tab = t; $('page-content').innerHTML = renderPage(); $('root').querySelector('.bottom-nav').innerHTML = renderNav(); window.scrollTo(0,0); }

function renderPage() {
  switch(tab) {
    case 'dashboard':   return pgDashboard();
    case 'loads':       return pgLoads();
    case 'expenses':    return pgExpenses();
    case 'fuel':        return pgFuel();
    case 'fleet':       return pgFleet();
    case 'settlements': return pgSettlements();
    case 'ifta':        return pgIFTA();
    case 'drivers':     return pgDrivers();
    case 'more':        return pgMore();
    default:            return pgDashboard();
  }
}

// ─── AUTH SCREEN ──────────────────────────────────────
function renderAuth() {
  if (authMode === 'otp') return renderOTP('Check your email or phone for the code');
  const isLogin = authMode === 'login';
  return `<div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo">
        <span class="truck-ico">🚛</span>
        <h1>HaulBook</h1>
        <p>Built for truckers, by truckers</p>
      </div>
      <h2>${isLogin ? 'Welcome back' : 'Create account'}</h2>
      <p class="sub">${isLogin ? 'Sign in to your account' : 'Start tracking your hauls'}</p>
      <div id="auth-err" class="err-msg" style="display:none"></div>
      ${!isLogin ? `
        <div style="margin-bottom:16px">
          <div class="fg" style="margin-bottom:8px"><label>I am a…</label></div>
          <div class="role-pick">
            <div class="role-btn ${selectedRole==='driver'?'active':''}" onclick="selectedRole='driver';render()">
              <span class="ico">🚚</span><span class="lbl">Driver</span><span class="desc">Track my loads & expenses</span>
            </div>
            <div class="role-btn ${selectedRole==='owner'?'active':''}" onclick="selectedRole='owner';render()">
              <span class="ico">👔</span><span class="lbl">Owner</span><span class="desc">Manage fleet & drivers</span>
            </div>
          </div>
        </div>
        <div class="field"><label>Full Name</label><input id="su-name" placeholder="Alex Smith" autocomplete="name"></div>
      ` : ''}
      <div class="field"><label>Email</label><input id="${isLogin?'li':'su'}-email" type="email" placeholder="you@example.com" autocomplete="email" inputmode="email"></div>
      <div class="field"><label>Password</label><input id="${isLogin?'li':'su'}-pass" type="password" placeholder="••••••••" autocomplete="${isLogin?'current':'new'}-password"></div>
      <button class="btn btn-primary" onclick="${isLogin?'doLogin()':'doSignup()'}">
        ${isLogin ? 'Sign in' : 'Create account'}
      </button>
      <div class="auth-switch">
        ${isLogin ? "No account? <span onclick=\"authMode='signup';render()\">Sign up free</span>"
                  : "Have an account? <span onclick=\"authMode='login';render()\">Sign in</span>"}
      </div>
    </div>
  </div>`;
}

// ─── DASHBOARD ────────────────────────────────────────
function pgDashboard() {
  const s = summary || {};
  const isOwner = user?.role === 'owner';
  const monthly = s.monthly || [];
  const labels  = monthly.map(m => m.mo?.slice(5) || '');
  const grossArr = monthly.map(m => parseFloat(m.gross)||0);

  const chartId = 'dash-chart';
  setTimeout(() => {
    const canvas = $(chartId);
    if (!canvas) return;
    new Chart(canvas, {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Gross', data: grossArr, backgroundColor: '#3b82f6', borderRadius: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
        scales: { y: { ticks: { callback: v => '$' + (v/1000).toFixed(0) + 'k' }, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } } }
    });
  }, 50);

  return `
  <div style="margin-bottom:14px">
    <div style="font-size:20px;font-weight:800">Hi, ${user?.name?.split(' ')[0]} 👋</div>
    <div style="color:var(--muted);font-size:14px">Here's your business at a glance</div>
  </div>
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-lbl">Gross Revenue</div><div class="kpi-val b">${$n(s.grossIncome)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Net Profit</div><div class="kpi-val ${(s.netProfit||0)>=0?'g':'r'}">${$n(s.netProfit)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Total Miles</div><div class="kpi-val">${$mi(s.totalMiles)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Loads</div><div class="kpi-val">${s.loadCount||0}</div></div>
  </div>
  ${isOwner && s.owner ? `
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-lbl">Drivers</div><div class="kpi-val b">${s.owner.driver_count}</div></div>
    <div class="kpi"><div class="kpi-lbl">Trucks</div><div class="kpi-val b">${s.owner.truck_count}</div></div>
  </div>` : ''}
  <div class="card">
    <div class="card-body">
      <div class="card-title">Revenue (12 months)</div>
      <div class="chart-wrap"><canvas id="${chartId}"></canvas></div>
    </div>
  </div>
  <div class="card">
    <div class="card-body">
      <div class="card-title">Tax Estimate</div>
      <div class="kpi-grid three">
        <div class="kpi"><div class="kpi-lbl">Self-Emp</div><div class="kpi-val r" style="font-size:15px">${$n(s.seTax)}</div></div>

      </div>

        <div class="fg"><label>Gross Pay ($)</label><input id="l-gross" type="number" inputmode="decimal" placeholder="0.00"></div>
        ${isOwner ? `<div class="fg"><label>Truck #</label><select id="l-truck"><option value="">— select —</option>${trucks.map(t=>`<option value="${t.id}">${t.unit_number}</option>`).join('')}</select></div>` : ''}
      </div>
      <div class="fg" style="margin-bottom:12px"><label>Notes</label><textarea id="l-notes" placeholder="Optional…"></textarea></div>

          <div class="li-icon" style="background:var(--pl)">📦</div>
          <div class="li-main">
            <div class="li-title">${l.origin||'?'} → ${l.destination||'?'} ${statusBadge(l.status)}</div>
            <div class="li-sub">${fd(l.date)} · ${$mi(l.miles)}${l.driver_name ? ' · '+l.driver_name : ''}</div>
          </div>
          <div class="li-amount g">${$n(l.gross)}</div>
          <button class="btn btn-danger btn-sm" onclick="delLoad('${l.id}')">✕</button>
        </div>`).join('')}
    </div>
  </div>`;
}

function calcLoadGross() {
  const mi = parseFloat(v('l-miles'))||0, rate = parseFloat(v('l-rate'))||0;
  const el = $('l-gross'); if(el && mi && rate && !el.dataset.manual) el.value = (mi*rate).toFixed(2);
}

async function addLoad() {
  const date = v('l-date'), origin = v('l-origin'), dest = v('l-dest');
  const miles = parseFloat(v('l-miles'))||0, rate = parseFloat(v('l-rate'))||0;
  const gross = parseFloat(v('l-gross'))||0;
  const status = v('l-status')||'delivered';
  const notes  = v('l-notes')||'';
  const truck_id = $('l-truck')?.value || '';
  if (!date) return toast('Date required','⚠️');
  if (gross <= 0 && miles <= 0) return toast('Enter miles or gross pay','⚠️');
  setBtnLoading('l-add', true);
  const r = await api('POST','/loads',{date,origin,destination:dest,miles,rate_per_mile:rate,gross:gross||(miles*rate),status,notes,truck_id});
  if (r?.ok) { toast('Load added!','✅'); await reload(); setTab('loads'); }
  else { toast(r?.error||'Error','❌'); setBtnLoading('l-add',false); }
}

async function delLoad(id) {
  if (!confirm('Delete this load?')) return;
  await api('DELETE',`/loads/${id}`);
  toast('Deleted','🗑️'); await reload(); setTab('loads');
}

  const g=parseFloat(v('f-gal'))||0, p=parseFloat(v('f-ppg'))||0;

}

async function addFuel() {
  const date=v('f-date'),state=v('f-state');
  const gal=parseFloat(v('f-gal'))||0, ppg=parseFloat(v('f-ppg'))||0;

  if(!date||!state){toast('Date and state required','⚠️');return;}
  if(gal<=0&&total<=0){toast('Enter gallons or total cost','⚠️');return;}
  setBtnLoading('f-add',true);
  const r=await api('POST','/fuel',{date,state,gallons:gal,price_per_gal:ppg,total_cost:total,odometer:odo,location:loc});
  if(r?.ok){toast('Fuel logged!','✅');await reload();setTab('fuel');}
  else{toast(r?.error||'Error','❌');setBtnLoading('f-add',false);}
}

// ─── RECEIPT SCANNING ─────────────────────────────────
async function onReceiptFile(input) {
  if (!input.files[0]) return;
  const prev = document.getElementById('receipt-preview');
  const img  = document.getElementById('receipt-img');
  const overlay = document.getElementById('scan-overlay');
  if (prev) prev.style.display = 'block';
  if (overlay) overlay.style.display = 'flex';
  if (img) img.src = URL.createObjectURL(input.files[0]);
  const fd = new FormData();
  fd.append('receipt', input.files[0]);
  try {
    const r = await fetch(BASE + '/receipts/scan', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: fd
    });
    const data = await r.json();
    if (data.date)        { const d = document.getElementById('f-date');  if(d) d.value = data.date; }
    if (data.amount)      { const a = document.getElementById('f-amt');   if(a) a.value = data.amount; }
    if (data.description) { const s = document.getElementById('f-desc'); if(s) s.value = data.description; }
    if (data.category)    { const c = document.getElementById('f-cat');  if(c) c.value = data.category; }
  } catch(e) { console.error('Scan failed', e); }
  finally { if (overlay) overlay.style.display = 'none'; }
}

// ─── MODAL ────────────────────────────────────────────
function showModal(html) {
  const bg = document.getElementById('modal-bg');
  const box = document.getElementById('modal-box');
  if (!bg || !box) return;
  box.innerHTML = html;
  bg.style.display = 'flex';
  setTimeout(() => bg.classList.add('open'), 10);
}
function closeModal() {
  const bg = document.getElementById('modal-bg');
  if (!bg) return;
  bg.classList.remove('open');
  setTimeout(() => { bg.style.display = 'none'; }, 200);
}

// ─── HELPERS ──────────────────────────────────────────
function today() {
  return new Date().toISOString().split('T')[0];
}
function $n(v) {
  return '$' + (parseFloat(v)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function $mi(v) {
  return (parseFloat(v)||0).toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1}) + ' mi';
}
